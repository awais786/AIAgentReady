name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . --group dev

      - name: Tests
        run: pytest

      - name: Lint
        run: ruff check .

      - name: Validate OpenSpec artifacts
        run: npx --yes @fission-ai/openspec@1 validate --all --no-interactive
